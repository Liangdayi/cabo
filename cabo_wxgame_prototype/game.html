<body class="flex justify-center items-center min-h-screen">
<div class="app-container shadow-2xl rounded-[40px] border-[8px] border-black text-white relative">
<!-- 顶部状态栏与对家 -->
<div class="h-[25%] flex flex-col px-4 pt-10">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-2">
<a class="p-2 bg-white/10 rounded-full" href="https://modao.cc/agent-py/workspace/69abae0d89350d730b6545fb/cabo_wxgame_prototype.html/index.html?render_html=true">
<svg aria-hidden="true" class="iconify iconify--material-symbols" data-icon="material-symbols:arrow-back" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="m7.825 13l5.6 5.6L12 20l-8-8l8-8l1.425 1.4l-5.6 5.6H20v2z" fill="currentColor"></path></svg>
</a>
<span class="text-sm font-medium opacity-60">Round 3 / 10</span>
</div>
<div class="px-3 py-1 bg-black/30 rounded-full text-xs border border-white/10">
                    我的总分: <span class="text-yellow-400 font-bold">24</span>
</div>
</div>
<!-- 对手区 -->
<div class="flex justify-center flex-col items-center">
<div class="flex gap-2 scale-75 opacity-80">
<div class="poker-card card-back w-16"></div>
<div class="poker-card card-back w-16"></div>
<div class="poker-card card-back w-16"></div>
<div class="poker-card card-back w-16"></div>
</div>
<div class="mt-1 flex items-center gap-2 px-2 py-0.5 bg-black/20 rounded-lg">
<div class="w-2 h-2 rounded-full bg-gray-400"></div>
<span class="text-[10px]">对手：张晓明 (4张牌)</span>
</div>
</div>
</div>
<!-- 中央操作区 -->
<div class="h-[40%] flex justify-center items-center gap-12 relative">
<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
<span class="text-8xl font-black italic">CABO</span>
</div>
<!-- 抽牌堆 -->
<div class="flex flex-col items-center gap-2 group" onclick="drawCard()">
<div class="poker-card card-back w-24 h-32 deck-shadow active:translate-y-1">
<svg aria-hidden="true" class="iconify text-4xl text-white/30 iconify--mdi" data-icon="mdi:rhombus-outline" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M12 2c-.5 0-1 .19-1.41.59l-8 8c-.79.78-.79 2.04 0 2.82l8 8c.78.79 2.04.79 2.82 0l8-8c.79-.78.79-2.04 0-2.82l-8-8C13 2.19 12.5 2 12 2m0 2l8 8l-8 8l-8-8Z" fill="currentColor"></path></svg>
</div>
<span class="text-[10px] font-bold text-blue-300">抽牌堆</span>
</div>
<!-- 弃牌堆 -->
<div class="flex flex-col items-center gap-2">
<div class="poker-card card-front w-24 h-32 shadow-xl">
<div class="text-red-600 font-bold text-2xl">7</div>
<div class="flex-1 flex items-center justify-center">
<svg aria-hidden="true" class="iconify text-3xl text-red-600 iconify--mdi" data-icon="mdi:cards-heart" height="1em" role="img" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z" fill="currentColor"></path></svg>
</div>
<div class="text-red-600 font-bold text-2xl self-end rotate-180">7</div>
<!-- 技能标签 -->
<div class="absolute -top-2 -right-2 bg-emerald-500 text-[8px] px-2 py-0.5 rounded-full text-white shadow-md">
                        PEEK 可用
                    </div>
</div>
<span class="text-[10px] font-bold text-red-300">弃牌堆</span>
</div>
</div>
<!-- 玩家操作区 -->
<div class="h-[35%] bg-black/20 rounded-t-[40px] px-4 pt-4 flex flex-col">
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
<span class="text-sm font-bold text-green-400">你的回合</span>
</div>
<button class="px-4 py-1.5 bg-yellow-500 text-slate-900 rounded-full text-xs font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all" onclick="callCabo()">
                    喊 CABO!
                </button>
</div>
<!-- 玩家手牌 -->
<div class="flex justify-center gap-3">

<div class="poker-card card-back w-20 h-28 relative group" onclick="handleCardClick(this, 1)">
<div class="absolute inset-0 bg-transparent flex items-end justify-center pb-2 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="text-[8px] bg-white/20 px-2 py-0.5 rounded-full">点击查看</span>
</div>
</div>

<div class="poker-card card-back w-20 h-28"></div>

<script>
        function drawCard() {
            const toast = document.getElementById('toast');
            const sheet = document.getElementById('actionSheet');
            
            // 模拟抽牌动画与操作
            toast.innerText = "抽取中...";
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
                sheet.classList.remove('hidden');
            }, 800);
        }

        function closeActions() {
            document.getElementById('actionSheet').classList.add('hidden');
        }

        function callCabo() {
            if(confirm("确定要喊 CABO 吗？本局将进入最后一轮结算！")) {
                alert("CABO! 所有人最后一次机会！");
            }
        }

        function handleCardClick(el, idx) {
            // 模拟偷看或替换选中
            el.classList.add('pulse-active');
            setTimeout(() => el.classList.remove('pulse-active'), 2000);
        }
    </script>
